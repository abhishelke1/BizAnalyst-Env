<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCOUT AI - Business Analyst</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .glass { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); }
        @keyframes pulse-ring { 0% { transform: scale(0.8); opacity: 1; } 100% { transform: scale(1.3); opacity: 0; } }
        @keyframes typing { from { width: 0 } to { width: 100% } }
        .animate-pulse-ring { animation: pulse-ring 1.5s cubic-bezier(0.215, 0.61, 0.355, 1) infinite; }
        .step-enter { animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .typing-effect { overflow: hidden; white-space: nowrap; animation: typing 1s steps(40, end); }
    </style>
</head>
<body class="bg-gray-900 text-white min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Step type icons and colors
        const stepConfig = {
            THINK: { icon: '🧠', color: 'text-purple-400', bg: 'bg-purple-500/20' },
            QUERY: { icon: '📊', color: 'text-blue-400', bg: 'bg-blue-500/20' },
            RESULT: { icon: '✓', color: 'text-green-400', bg: 'bg-green-500/20' },
            INSIGHT: { icon: '💡', color: 'text-yellow-400', bg: 'bg-yellow-500/20' },
            ERROR: { icon: '⚠️', color: 'text-red-400', bg: 'bg-red-500/20' },
            ANSWER: { icon: '🎯', color: 'text-emerald-400', bg: 'bg-emerald-500/20' },
            DECIDE: { icon: '🤔', color: 'text-indigo-400', bg: 'bg-indigo-500/20' },
            ANALYZE: { icon: '📈', color: 'text-cyan-400', bg: 'bg-cyan-500/20' }
        };

        // Demo questions
        const demoQuestions = [
            "Why did revenue change between 2023 and 2024?",
            "Which customers are at risk of churning?",
            "Are there products with pricing problems?",
            "Find any anomalies in our business data",
            "How do different regions compare?"
        ];

        function App() {
            const [view, setView] = useState('home'); // home, investigating, result
            const [question, setQuestion] = useState('');
            const [taskId, setTaskId] = useState(null);
            const [steps, setSteps] = useState([]);
            const [result, setResult] = useState(null);
            const [isLoading, setIsLoading] = useState(false);
            const stepsEndRef = useRef(null);

            const API_URL = window.location.origin;

            // Scroll to bottom when new steps arrive
            useEffect(() => {
                stepsEndRef.current?.scrollIntoView({ behavior: 'smooth' });
            }, [steps]);

            const startInvestigation = async (q) => {
                const questionToUse = q || question;
                if (!questionToUse.trim()) return;

                setIsLoading(true);
                setView('investigating');
                setSteps([]);
                setResult(null);

                try {
                    const response = await fetch(`${API_URL}/api/scout`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ question: questionToUse, max_steps: 10 })
                    });
                    
                    const data = await response.json();
                    setTaskId(data.task_id);
                    
                    // Start polling for results
                    pollResults(data.task_id);
                } catch (error) {
                    console.error('Error:', error);
                    setIsLoading(false);
                }
            };

            const pollResults = async (id) => {
                const poll = async () => {
                    try {
                        const response = await fetch(`${API_URL}/api/scout/${id}`);
                        const data = await response.json();
                        
                        setSteps(data.steps || []);
                        
                        if (data.status === 'complete') {
                            setResult(data);
                            setView('result');
                            setIsLoading(false);
                            return;
                        } else if (data.status === 'error') {
                            setIsLoading(false);
                            return;
                        }
                        
                        // Continue polling
                        setTimeout(poll, 1000);
                    } catch (error) {
                        console.error('Poll error:', error);
                        setTimeout(poll, 2000);
                    }
                };
                
                poll();
            };

            const goHome = () => {
                setView('home');
                setSteps([]);
                setResult(null);
                setQuestion('');
            };

            // HOME VIEW
            if (view === 'home') {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center p-8">
                        {/* Hero */}
                        <div className="text-center mb-12">
                            <div className="flex items-center justify-center mb-4">
                                <div className="w-16 h-16 rounded-full gradient-bg flex items-center justify-center text-3xl">
                                    🔍
                                </div>
                            </div>
                            <h1 className="text-5xl font-bold mb-4 bg-gradient-to-r from-purple-400 to-pink-400 bg-clip-text text-transparent">
                                SCOUT AI
                            </h1>
                            <p className="text-xl text-gray-400 mb-2">
                                Your AI Business Analyst That Never Sleeps
                            </p>
                            <p className="text-gray-500">
                                From question to decision in 30 seconds
                            </p>
                        </div>

                        {/* Search Box */}
                        <div className="w-full max-w-2xl mb-8">
                            <div className="relative">
                                <input
                                    type="text"
                                    value={question}
                                    onChange={(e) => setQuestion(e.target.value)}
                                    onKeyPress={(e) => e.key === 'Enter' && startInvestigation()}
                                    placeholder="Ask a business question..."
                                    className="w-full px-6 py-4 bg-gray-800 border border-gray-700 rounded-2xl text-lg focus:outline-none focus:border-purple-500 focus:ring-2 focus:ring-purple-500/20"
                                />
                                <button
                                    onClick={() => startInvestigation()}
                                    disabled={!question.trim()}
                                    className="absolute right-2 top-2 px-6 py-2 bg-gradient-to-r from-purple-500 to-pink-500 rounded-xl font-semibold disabled:opacity-50 hover:opacity-90 transition"
                                >
                                    Investigate
                                </button>
                            </div>
                        </div>

                        {/* Demo Questions */}
                        <div className="w-full max-w-2xl">
                            <p className="text-gray-500 text-sm mb-3">Try these examples:</p>
                            <div className="flex flex-wrap gap-2">
                                {demoQuestions.map((q, i) => (
                                    <button
                                        key={i}
                                        onClick={() => {
                                            setQuestion(q);
                                            startInvestigation(q);
                                        }}
                                        className="px-4 py-2 bg-gray-800 hover:bg-gray-700 rounded-full text-sm text-gray-300 transition"
                                    >
                                        {q}
                                    </button>
                                ))}
                            </div>
                        </div>

                        {/* Features */}
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mt-16 w-full max-w-4xl">
                            <div className="p-6 bg-gray-800/50 rounded-xl border border-gray-700">
                                <div className="text-3xl mb-3">🔄</div>
                                <h3 className="font-semibold mb-2">Autonomous Investigation</h3>
                                <p className="text-sm text-gray-400">Chains multiple queries to find root causes</p>
                            </div>
                            <div className="p-6 bg-gray-800/50 rounded-xl border border-gray-700">
                                <div className="text-3xl mb-3">💡</div>
                                <h3 className="font-semibold mb-2">Live Reasoning</h3>
                                <p className="text-sm text-gray-400">Watch the AI think and analyze in real-time</p>
                            </div>
                            <div className="p-6 bg-gray-800/50 rounded-xl border border-gray-700">
                                <div className="text-3xl mb-3">🎯</div>
                                <h3 className="font-semibold mb-2">Actionable Insights</h3>
                                <p className="text-sm text-gray-400">Get recommendations, not just data</p>
                            </div>
                        </div>
                    </div>
                );
            }

            // INVESTIGATING VIEW
            if (view === 'investigating') {
                return (
                    <div className="min-h-screen p-8">
                        {/* Header */}
                        <div className="flex items-center justify-between mb-8">
                            <div>
                                <h2 className="text-2xl font-bold">🔍 Investigating...</h2>
                                <p className="text-gray-400 mt-1">"{question}"</p>
                            </div>
                            <div className="flex items-center space-x-2">
                                <div className="w-3 h-3 rounded-full bg-green-500 animate-pulse"></div>
                                <span className="text-green-400 text-sm">Agent Active</span>
                            </div>
                        </div>

                        {/* Steps */}
                        <div className="max-w-4xl mx-auto space-y-4">
                            {steps.map((step, index) => {
                                const config = stepConfig[step.type] || stepConfig.THINK;
                                return (
                                    <div 
                                        key={index} 
                                        className={`p-4 rounded-xl border border-gray-700 step-enter ${config.bg}`}
                                    >
                                        <div className="flex items-start space-x-3">
                                            <span className="text-2xl">{config.icon}</span>
                                            <div className="flex-1">
                                                <div className="flex items-center space-x-2 mb-1">
                                                    <span className={`font-semibold ${config.color}`}>
                                                        {step.type}
                                                    </span>
                                                    <span className="text-xs text-gray-500">
                                                        Step {step.step}
                                                    </span>
                                                </div>
                                                <p className="text-gray-300 whitespace-pre-wrap">
                                                    {step.content}
                                                </p>
                                                {step.data && step.data.rows && (
                                                    <div className="mt-2 p-2 bg-gray-900/50 rounded text-xs overflow-x-auto">
                                                        <table className="w-full">
                                                            <tbody>
                                                                {step.data.rows.slice(0, 3).map((row, i) => (
                                                                    <tr key={i}>
                                                                        {Object.entries(row).map(([k, v], j) => (
                                                                            <td key={j} className="px-2 py-1 text-gray-400">
                                                                                <span className="text-gray-600">{k}:</span> {String(v)}
                                                                            </td>
                                                                        ))}
                                                                    </tr>
                                                                ))}
                                                            </tbody>
                                                        </table>
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    </div>
                                );
                            })}
                            
                            {isLoading && (
                                <div className="flex items-center justify-center p-8">
                                    <div className="relative">
                                        <div className="w-12 h-12 rounded-full gradient-bg animate-pulse"></div>
                                        <div className="absolute inset-0 w-12 h-12 rounded-full gradient-bg animate-pulse-ring"></div>
                                    </div>
                                </div>
                            )}
                            <div ref={stepsEndRef} />
                        </div>
                    </div>
                );
            }

            // RESULT VIEW
            if (view === 'result' && result) {
                const rec = result.recommendations || {};
                return (
                    <div className="min-h-screen p-8">
                        {/* Header */}
                        <div className="flex items-center justify-between mb-8">
                            <button 
                                onClick={goHome}
                                className="flex items-center space-x-2 text-gray-400 hover:text-white transition"
                            >
                                <span>←</span>
                                <span>New Investigation</span>
                            </button>
                            <div className="flex items-center space-x-2">
                                <span className="text-green-400">✓ Complete</span>
                                <span className="text-gray-500">|</span>
                                <span className="text-gray-400">{result.execution_time?.toFixed(1)}s</span>
                            </div>
                        </div>

                        <div className="max-w-4xl mx-auto">
                            {/* Question */}
                            <div className="mb-8">
                                <p className="text-gray-500 text-sm mb-2">Question</p>
                                <h2 className="text-2xl font-bold">{result.question}</h2>
                            </div>

                            {/* Main Answer Card */}
                            <div className="p-6 bg-gradient-to-br from-purple-500/20 to-pink-500/20 rounded-2xl border border-purple-500/30 mb-8">
                                <div className="flex items-start justify-between mb-4">
                                    <div>
                                        <span className="px-3 py-1 bg-purple-500/30 rounded-full text-purple-300 text-sm">
                                            Key Finding
                                        </span>
                                    </div>
                                    <div className="flex items-center space-x-1">
                                        <span className="text-sm text-gray-400">Confidence:</span>
                                        <span className={`font-bold ${result.confidence > 0.7 ? 'text-green-400' : 'text-yellow-400'}`}>
                                            {(result.confidence * 100).toFixed(0)}%
                                        </span>
                                    </div>
                                </div>
                                <p className="text-xl leading-relaxed whitespace-pre-wrap">
                                    {result.answer}
                                </p>
                            </div>

                            {/* Recommendations */}
                            {rec.actions && rec.actions.length > 0 && (
                                <div className="mb-8">
                                    <h3 className="text-lg font-semibold mb-4 flex items-center">
                                        <span className="mr-2">🎯</span>
                                        Recommended Actions
                                    </h3>
                                    <div className="space-y-3">
                                        {rec.actions.map((action, i) => (
                                            <div 
                                                key={i}
                                                className="p-4 bg-gray-800 rounded-xl border-l-4 border-purple-500"
                                            >
                                                <div className="flex items-center justify-between mb-2">
                                                    <span className="font-semibold">{action.action}</span>
                                                    <span className={`px-2 py-1 rounded text-xs ${
                                                        action.priority === 'Critical' ? 'bg-red-500/20 text-red-400' :
                                                        action.priority === 'High' ? 'bg-orange-500/20 text-orange-400' :
                                                        'bg-blue-500/20 text-blue-400'
                                                    }`}>
                                                        {action.priority}
                                                    </span>
                                                </div>
                                                <p className="text-sm text-gray-400">{action.reason}</p>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {/* Insights */}
                            {result.insights && result.insights.length > 0 && (
                                <div className="mb-8">
                                    <h3 className="text-lg font-semibold mb-4 flex items-center">
                                        <span className="mr-2">💡</span>
                                        Insights Discovered
                                    </h3>
                                    <div className="grid gap-4">
                                        {result.insights.map((insight, i) => (
                                            <div key={i} className="p-4 bg-gray-800 rounded-xl">
                                                <p className="font-medium mb-2">{insight.finding}</p>
                                                <p className="text-sm text-gray-400">{insight.evidence}</p>
                                                {insight.recommendation && (
                                                    <p className="text-sm text-purple-400 mt-2">
                                                        → {insight.recommendation}
                                                    </p>
                                                )}
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {/* Investigation Steps (Collapsible) */}
                            <details className="mb-8">
                                <summary className="cursor-pointer text-gray-400 hover:text-white transition">
                                    View Investigation Steps ({result.steps?.length || 0} steps, {result.total_queries} queries)
                                </summary>
                                <div className="mt-4 space-y-3">
                                    {(result.steps || []).map((step, i) => {
                                        const config = stepConfig[step.type] || stepConfig.THINK;
                                        return (
                                            <div key={i} className={`p-3 rounded-lg ${config.bg}`}>
                                                <div className="flex items-center space-x-2 mb-1">
                                                    <span>{config.icon}</span>
                                                    <span className={`text-sm font-medium ${config.color}`}>{step.type}</span>
                                                </div>
                                                <p className="text-sm text-gray-300 whitespace-pre-wrap">{step.content}</p>
                                            </div>
                                        );
                                    })}
                                </div>
                            </details>

                            {/* New Investigation Button */}
                            <div className="text-center">
                                <button
                                    onClick={goHome}
                                    className="px-8 py-3 bg-gradient-to-r from-purple-500 to-pink-500 rounded-xl font-semibold hover:opacity-90 transition"
                                >
                                    Start New Investigation
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            return null;
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
