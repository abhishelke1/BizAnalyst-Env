name: SCOUT-AI-BizAnalyst
version: "1.0.0"
description: >
  SCOUT AI - Autonomous Business Analyst Agent. AI agents learn to analyze 
  business data autonomously: querying databases, detecting anomalies, 
  identifying churn risk, and generating actionable recommendations. 
  Real-world BI analyst training environment.
domain: business_intelligence
real_world_task: true
tasks:
  - id: revenue_summary
    difficulty: easy
    max_steps: 10
  - id: customer_churn_risk
    difficulty: medium
    max_steps: 15
  - id: anomaly_investigation
    difficulty: hard
    max_steps: 20
action_space:
  type: discrete_structured
  actions: [run_query, describe_table, list_tables, submit_answer]
observation_space:
  type: structured_text
  includes: [task_description, query_results, step_info, table_list]
reward:
  type: continuous
  range: [0.0, 1.0]
  shaped: true
endpoints:
  base_url: http://localhost:7860
  reset: POST /reset
  step: POST /step
  state: GET /state
  tasks: GET /tasks
  grader: POST /grader
  baseline: POST /baseline
tags: [business-intelligence, sql, analytics, autonomous-agent, openenv]

